name: deploy

# Deploys the crew-bus Worker from CI so the live code always equals a tag on
# main -- no laptop-local wrangler deploys (IaC doctrine; the hardcoded-0.1.0
# /health drift was only findable because deploys were hand-run).
#
# Trigger: push a SemVer tag (v0.1.2) on a main commit. workflow_dispatch may
# run typecheck/tests, but migrate/deploy/verify steps are guarded with
# `if: startsWith(github.ref, 'refs/tags/v')` so a branch dispatch never ships
# (common-thread pattern). Gap 1: tag must be an ancestor of origin/main.
# Secrets:
#   CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID — scoped crew-bus-ci token
#   SKYPHUSION_WRANGLER_TOML — production wrangler.toml blob (never committed)
#   CREW_BUS_HEALTH_URL — full /health URL for post-deploy version verify
#
# Tag namespaces (do not confuse):
#   v*           → this workflow (Worker deploy)
#   crew-bus-v*  → publish-npm.yml (@skyphusion/crew-bus)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-crew-bus
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install (workspace root)
        working-directory: .
        run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Materialize production wrangler.toml
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: .
        env:
          SKYPHUSION_WRANGLER_TOML: ${{ secrets.SKYPHUSION_WRANGLER_TOML }}
        run: node scripts/materialize-config.mjs
      # D1 migrations run BEFORE the deploy, from CI, every release.
      #
      # WHY THIS EXISTS: the #43 migration (0001_webhook_vpc_target.sql) was documented as a
      # manual step and this workflow had no migrations stage, so v0.6.0 shipped code whose
      # webhook reads referenced columns that did not exist yet. Every doorbell read threw and
      # the whole fleet silently degraded to poll until the ALTERs were applied by hand. A
      # migration that only a human remembers is a migration that eventually does not run.
      #
      # `migrations apply` is idempotent: it consults d1_migrations and applies only what is
      # pending, so a release with no new migration is a no-op. It runs BEFORE deploy so the
      # schema is never behind the code (additive-only migrations make that ordering safe;
      # a destructive migration would need a different, two-release dance).
      - name: Apply D1 migrations
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply crew-bus --remote

      - name: Deploy Worker
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: Verify served version matches the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CREW_BUS_HEALTH_URL: ${{ secrets.CREW_BUS_HEALTH_URL }}
        run: |
          : "${CREW_BUS_HEALTH_URL:?CREW_BUS_HEALTH_URL secret is required}"
          WANT=$(node -e "console.log(require('./package.json').version)")
          # Edge propagation lags the API call; poll up to 2 min (first tag run
          # caught 0.1.0 five seconds after a successful 0.1.2 deploy).
          for i in $(seq 1 24); do
            SERVED=$(curl -sS "$CREW_BUS_HEALTH_URL" | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).version))")
            echo "attempt $i: served=$SERVED want=$WANT"
            [ "$SERVED" = "$WANT" ] && exit 0
            sleep 5
          done
          exit 1
