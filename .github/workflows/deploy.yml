name: deploy

# Deploys the crew-bus Worker from CI so the live code always equals a tag on
# main -- no laptop-local wrangler deploys (IaC doctrine; the hardcoded-0.1.0
# /health drift was only findable because deploys were hand-run).
#
# Trigger: push a SemVer tag (v0.1.2) on a main commit, or workflow_dispatch.
# Secrets: CLOUDFLARE_API_TOKEN (scoped crew-bus-ci token), CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-crew-bus
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, fleet]
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install (workspace root)
        working-directory: .
        run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: Verify served version matches the release
        run: |
          sleep 5
          SERVED=$(curl -sS https://bus-internal.skyphusion.org/health | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).version))")
          WANT=$(node -e "console.log(require('./package.json').version)")
          echo "served=$SERVED want=$WANT"
          test "$SERVED" = "$WANT"
