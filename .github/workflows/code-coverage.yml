name: code-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  code-quality: write
  pull-requests: write

jobs:
  coverage:
    runs-on: [self-hosted, fleet]
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install (workspace root)
        working-directory: .
        run: npm ci
      - run: npx vitest run --coverage.enabled=true --coverage.reporter=cobertura
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./worker/coverage/cobertura-coverage.xml
          language: javascript
